name: Auto Publish

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: |
          # Auto-detect and publish all packages
          for package_dir in packages/*; do
            if [ -d "$package_dir" ] && [ -f "$package_dir/package.json" ]; then
              if git diff HEAD~1 HEAD "$package_dir/package.json" | grep -q '^\+.*"version"'; then
                echo "Publishing $package_dir..."
                cd "$package_dir" && npm publish --access public && cd -
              fi
            fi
          done

          # Ryziz template
          if git diff HEAD~1 HEAD templates/ryziz/package.json | grep -q '^\+.*"version"'; then
            echo "Publishing templates/ryziz..."
            cd templates/ryziz
            mv .gitignore gitignore
            npm publish --access public
            mv gitignore .gitignore
            cd -
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
